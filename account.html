<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kunden-Login | Gerald Barth Logistik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.cdnfonts.com/css/ethnocentric" rel="stylesheet">
    <style>
        .tech-font { font-family: 'Ethnocentric', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 font-sans text-white min-h-screen flex flex-col">

    <div id="header-placeholder"></div>

    <main class="flex-grow flex items-center justify-center px-6 py-20">
        <div class="max-w-md w-full">
            
            <div class="bg-zinc-900 border border-white/10 p-10 rounded-2xl shadow-2xl">
                <div class="text-center mb-10">
                    <div class="inline-block w-12 h-12 bg-yellow-500 rounded-lg mb-4 flex items-center justify-center font-black text-black text-2xl italic">B</div>
                    <h1 class="tech-font text-xl uppercase tracking-tighter">Kunden <span class="text-yellow-500">Login</span></h1>
                    <p class="text-zinc-500 text-[10px] uppercase tracking-[0.3em] mt-2 font-bold">Portal für Logistik & Erdbau</p>
                </div>

                <form action="#" method="POST" class="space-y-6">
                    <div>
                        <label class="block text-[10px] uppercase tracking-widest text-zinc-500 mb-2 font-black">Benutzername oder E-Mail</label>
                        <input type="text" name="username" required
                            class="w-full px-4 py-4 bg-zinc-800 border border-white/5 rounded-lg focus:ring-2 focus:ring-yellow-500 focus:outline-none transition-all text-sm">
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="text-[10px] uppercase tracking-widest text-zinc-500 font-black">Passwort</label>
                            <a href="#" class="text-[9px] text-yellow-500 uppercase font-bold hover:underline">Vergessen?</a>
                        </div>
                        <input type="password" name="password" required
                            class="w-full px-4 py-4 bg-zinc-800 border border-white/5 rounded-lg focus:ring-2 focus:ring-yellow-500 focus:outline-none transition-all text-sm">
                    </div>

                    <button type="submit" 
                        class="w-full bg-yellow-500 hover:bg-white text-black font-black uppercase tracking-[0.2em] py-5 rounded-lg transition-all shadow-lg active:scale-[0.98] text-xs">
                        Anmelden
                    </button>
                </form>

                <div class="mt-8 pt-8 border-t border-white/5 text-center">
                    <p class="text-zinc-500 text-[10px] uppercase tracking-widest">
                        Noch kein Kundenkonto? <br>
                        <a href="mailto:office@gerald-barth.at" class="text-yellow-500 font-black hover:underline mt-2 inline-block">Zugang anfragen</a>
                    </p>
                </div>
            </div>

            <div class="text-center mt-6">
                <a href="index.html" class="text-zinc-600 hover:text-white text-[9px] uppercase tracking-[0.4em] transition">← Zurück zur Startseite</a>
            </div>
        </div>
    </main>

    <script>
        fetch('header.html')
            .then(res => res.text())
            .then(data => document.getElementById('header-placeholder').innerHTML = data);
    </script>

</body>
</html>
